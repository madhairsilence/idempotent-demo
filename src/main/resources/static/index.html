<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idempotent API Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        :root {
            --bg: #f5f2ea;
            --bg-accent: #f0e7d8;
            --paper: #fffdf7;
            --ink: #1f2a37;
            --muted: #6b7280;
            --accent: #b6542f;
            --accent-2: #2b6e61;
            --border: #dbcdb4;
            --ok: #1f7a3e;
            --err: #a31212;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 15% 20%, rgba(182, 84, 47, 0.25), transparent 35%),
                radial-gradient(circle at 80% 5%, rgba(43, 110, 97, 0.18), transparent 32%),
                linear-gradient(180deg, var(--bg), var(--bg-accent));
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            gap: 20px;
            min-height: calc(100vh - 48px);
            animation: fadeIn 600ms ease-out;
        }

        @media (min-width: 980px) {
            .container {
                grid-template-columns: 1.1fr 0.9fr;
                align-items: stretch;
            }
        }

        .panel {
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 16px 36px rgba(31, 42, 55, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-head {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, rgba(182, 84, 47, 0.08), rgba(43, 110, 97, 0.08));
        }

        .panel-head-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h1, h2 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        h1 {
            font-size: 1.2rem;
        }

        h2 {
            font-size: 1rem;
        }

        .status {
            font-size: 0.82rem;
            color: var(--muted);
        }

        .panel-body {
            padding: 18px;
            display: grid;
            gap: 14px;
        }

        .panel.log-panel .panel-body {
            flex: 1;
            min-height: 0;
        }

        .description {
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent-2);
            border-radius: 10px;
            padding: 10px 12px;
            background: #faf7f0;
            color: var(--ink);
            font-size: 0.88rem;
            line-height: 1.4;
            margin-top: 8px;
        }

        .image-pane {
            margin-top: 10px;
            height: 200px;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            background: #f2ebde;
            cursor: zoom-in;
        }

        .image-pane img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
        }

        .image-modal {
            position: fixed;
            inset: 0;
            background: rgba(20, 26, 35, 0.72);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .image-modal.open {
            display: flex;
        }

        .image-modal-content {
            position: relative;
            width: min(1100px, 96vw);
            max-height: 92vh;
            background: #fffdf7;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 16px 36px rgba(31, 42, 55, 0.25);
        }

        .image-modal-content img {
            width: 100%;
            max-height: calc(92vh - 70px);
            object-fit: contain;
            display: block;
            border-radius: 8px;
        }

        .image-modal-close {
            position: absolute;
            top: 8px;
            right: 8px;
            width: auto;
            padding: 6px 10px;
            font-size: 0.8rem;
            background: linear-gradient(90deg, #5b6472, #7a8594);
            border-radius: 8px;
        }

        label {
            font-size: 0.88rem;
            font-weight: 600;
        }

        textarea,
        select,
        button {
            width: 100%;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-family: "IBM Plex Mono", monospace;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
            padding: 12px;
            line-height: 1.35;
            font-size: 0.9rem;
            background: #fff;
        }

        select {
            padding: 10px;
            font-size: 0.9rem;
            background: white;
        }

        button {
            background: linear-gradient(90deg, var(--accent), #dd815d);
            color: white;
            border: none;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(182, 84, 47, 0.22);
        }

        .clear-log-btn {
            width: auto;
            padding: 8px 12px;
            font-size: 0.8rem;
            line-height: 1;
            background: linear-gradient(90deg, #5b6472, #7a8594);
        }

        .clear-log-btn:hover {
            box-shadow: 0 6px 14px rgba(31, 42, 55, 0.22);
        }

        .log {
            height: 100%;
            overflow-y: auto;
            display: grid;
            align-content: start;
            gap: 10px;
        }

        .log-item {
            border: 1px solid var(--border);
            border-left: 5px solid var(--accent-2);
            border-radius: 10px;
            padding: 10px;
            background: #fff;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.83rem;
            white-space: pre-wrap;
            word-break: break-word;
            animation: slideUp 250ms ease-out;
        }

        .log-item.error {
            border-left-color: var(--err);
        }

        .row {
            display: grid;
            gap: 12px;
            grid-template-columns: 1fr;
        }

        @media (min-width: 900px) {
            .row {
                grid-template-columns: 1fr 1fr;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="container">
    <section class="panel">
        <div class="panel-head">
            <h1>Idempotent API Demo</h1>
            <span id="wsStatus" class="status">WebSocket: connecting...</span>
        </div>
        <div class="panel-body">
            <div>
                <label for="apiAction">Operation</label>
                <select id="apiAction">
                    <option value="create">Call Legacy API (direct)</option>
                    <option value="create-idem">Call via Idempotent API</option>
                    <option value="create-with-key">Call via Idempotent API with Client Key </option>
                    <option value="create-async">Create through Job Schedule</option>
                </select>
                <div id="operationDescription" class="description"></div>
                <div class="image-pane">
                    <img
                        id="operationImage"
                        src=""
                        alt="Operation Illustration"
                        onerror="this.style.display='none'"
                    >
                </div>
            </div>
            <div>
                <label for="requestInput">Request JSON</label>
                <textarea id="requestInput">{
  "name": "Alex",
  "address": "42 River Road",
  "phone": 987654321
}</textarea>
            </div>
            <button id="submitBtn" type="button">Call API</button>
        </div>
    </section>

    <section class="panel log-panel">
        <div class="panel-head">
            <h2>Response Log</h2>
            <div class="panel-head-right">
                <button id="clearLogBtn" class="clear-log-btn" type="button">Clear Log</button>
            </div>
        </div>
        <div class="panel-body">
            <div id="logStream" class="log"></div>
        </div>
    </section>
</div>

<div id="imageModal" class="image-modal" aria-hidden="true">
    <div class="image-modal-content" role="dialog" aria-modal="true" aria-label="Operation image preview">
        <button id="imageModalClose" class="image-modal-close" type="button">Close</button>
        <img id="modalImage" src="" alt="Operation image expanded view">
    </div>
</div>

<script>
    const requestInput = document.getElementById("requestInput");
    const apiAction = document.getElementById("apiAction");
    const submitBtn = document.getElementById("submitBtn");
    const clearLogBtn = document.getElementById("clearLogBtn");
    const logStream = document.getElementById("logStream");
    const wsStatus = document.getElementById("wsStatus");
    const operationDescription = document.getElementById("operationDescription");
    const operationImage = document.getElementById("operationImage");
    const imageModal = document.getElementById("imageModal");
    const imageModalClose = document.getElementById("imageModalClose");
    const modalImage = document.getElementById("modalImage");

    const operationMeta = {
        "create": {
            description: "Calls the legacy method, which will create a new record everytime it is called even with same data.",
            sample: {
                name: "Alex",
                address: "42 River Road",
                phone: 987654321
            },
            img : "default.png"
        },
        "create-idem": {
            description: "This invokes a PROXY API, which creates an idempotent key by hashing the body , before calling the Legacy API. Only one record will be created, and subsequent identical requests are rejected for 30 seconds (cache TTL = 30 secs). For demo purpose, caffine cache is used instead of Redis.",
            sample: {
                name: "Priya",
                address: "18 Lake View",
                phone: 912345678
            },
            img : "hash.png"
        },
        "create-with-key": {
            description: "This invokes a PROXY API but the client provides the idempotent key. Suitable when the client imposes idempotency.For demo purpose, caffine cache is used instead of Redis",
            sample: {
                idemKey: "idem-key-1001",
                userData: {
                    name: "Noah",
                    address: "88 Cedar Street",
                    phone: 998877665
                }
            },
            img : "custom.png"
        },
        "create-async": {
            description: "Creates an idempotent job , which calls the legacy API asynchronously. The idempotency is enforced at the JOB level. Suitable for transactions , where user tries to pay multiple times for the same transaction. Until the Job is complete, new objects WILL NOT be created. Note : After clicking Call API, wait 5 seconds for the websocket to append the result.",
            sample: {
                idemKey: "idem-async-2001",
                userData: {
                    name: "Mia",
                    address: "7 Ocean Avenue",
                    phone: 934567812
                }
            },
            img : "async.png"
        }
    };

    function appendLog(source, payload, isError = false) {
        const item = document.createElement("div");
        item.className = "log-item" + (isError ? " error" : "");
        const stamp = new Date().toLocaleTimeString();
        const message = payload && typeof payload === "object"
            ? payload.message || payload.error || payload.details || "(no message)"
            : String(payload);
        item.textContent = `[${stamp}] ${source}: ${message}`;
        logStream.prepend(item);
    }

    function tryFormatJson(value) {
        try {
            return JSON.stringify(JSON.parse(value), null, 2);
        } catch (err) {
            return value;
        }
    }

    function buildRequestPayload(action, rawPayload) {
        if (action === "create") {
            return rawPayload;
        }

        return {
            idemKey: rawPayload.idemKey || "demo-key-001",
            userData: rawPayload.userData || {
                name: rawPayload.name,
                address: rawPayload.address,
                phone: rawPayload.phone
            }
        };
    }

    function updateOperationUi() {
        const action = apiAction.value;
        const meta = operationMeta[action];
        if (!meta) {
            return;
        }

        operationDescription.textContent = meta.description;
        operationImage.src = "images/"+meta.img;
        requestInput.value = JSON.stringify(meta.sample, null, 2);
    }

    function openImageModal() {
        if (!operationImage.src) {
            return;
        }
        modalImage.src = operationImage.src;
        imageModal.classList.add("open");
        imageModal.setAttribute("aria-hidden", "false");
    }

    function closeImageModal() {
        imageModal.classList.remove("open");
        imageModal.setAttribute("aria-hidden", "true");
    }

    async function callApi() {
        let parsed;
        try {
            parsed = JSON.parse(requestInput.value);
        } catch (err) {
            const message = { error: "Invalid JSON in request" };
            appendLog("API", message, true);
            return;
        }

        const action = apiAction.value;
        const payload = buildRequestPayload(action, parsed);

        try {
            const res = await fetch(`/users/${action}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            appendLog("API", data, !res.ok || data.success === false);
        } catch (err) {
            const message = { error: "Network error", details: String(err) };
            appendLog("API", message, true);
        }
    }

    function connectWebSocket() {
        const socket = new SockJS("/ws");
        const client = Stomp.over(socket);
        client.debug = () => {};

        client.connect({}, () => {
            wsStatus.textContent = "WebSocket: connected";
            wsStatus.style.color = "var(--ok)";
            client.subscribe("/topic/async-results", (message) => {
                const payload = JSON.parse(message.body);
                appendLog("WebSocket", payload, payload.success === false);
            });
        }, (error) => {
            wsStatus.textContent = "WebSocket: disconnected";
            wsStatus.style.color = "var(--err)";
            appendLog("WebSocket", { error: "Connection error", details: String(error) }, true);
        });
    }

    submitBtn.addEventListener("click", callApi);
    clearLogBtn.addEventListener("click", () => {
        logStream.innerHTML = "";
    });
    operationImage.addEventListener("click", openImageModal);
    imageModalClose.addEventListener("click", closeImageModal);
    imageModal.addEventListener("click", (event) => {
        if (event.target === imageModal) {
            closeImageModal();
        }
    });
    document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && imageModal.classList.contains("open")) {
            closeImageModal();
        }
    });
    apiAction.addEventListener("change", updateOperationUi);
    requestInput.value = tryFormatJson(requestInput.value);
    updateOperationUi();
    connectWebSocket();
</script>
</body>
</html>
